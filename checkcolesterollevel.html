<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check Your Cholesterol Level</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #E7C2D4;
        font-family: "Outfit", sans-serif;
        padding: 2rem;
      }

      .card-health {
        background-color: #E7C2D4;
        padding: 1rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .btn-back {
        background-color: #252b61;
        border: none;
        border-radius: 50%;
        width: 42px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-back img {
        width: 14px;
        height: 14px;
      }

      .title {
        font-family: "Outfit", sans-serif;
        font-weight: 600;
        font-size: 1.25rem;
        color: #252b61;
        margin-left: 10px;
      }

      .subtitle {
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        font-weight: 500;
        color: #252b61;
        margin-bottom: 1rem;
        margin-left: 60px;
      }

      .value {
        font-weight: 700;
        font-size: 2rem;
        margin-left: 60px;
        color: #252b61;
      }

      .unit {
        font-size: 1.2rem;
        font-family: "Inter", sans-serif;
        align-self: flex-end;
        font-weight: bold;
        margin-left: 20px;
        color: #716e6e;
        padding-bottom: 1px;
      }

      .date {
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 32px;
        margin-left: 60px;
        color: #716e6e;
      }

      .graph-image {
        width: 100%;
        max-width: 100%;
        margin-left: 35px;
        border-radius: 8px;
        display: block;
      }

      /* Mobile Responsive */
      @media (max-width: 576px) {
        body {
          padding: 1rem;
        }

        .subtitle {
    margin-top: 20px;
    margin-left: 0; 
    /* atau bisa juga 5px sesuai selera */
  }
        .value,
        .date {
          margin-left: 10px;
        }

        .graph-image {
          margin-left: 0;
          width: 100%;
          height: auto;
          max-height: 250px; /* atau bebas kamu bisa atur lebih besar */
          object-fit: contain;
        }

        .unit {
          font-size: 1rem;
          margin-left: 10px;
        }

        .date {
          font-size: 24px;
        }

        .value {
          font-size: 1.75rem;
        }

        .title {
          font-size: 1.1rem;
        }

        .btn-back {
          width: 36px;
          height: 36px;
        }

        .btn-back img {
          width: 12px;
          height: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card-health">
        <div class="d-flex align-items-center gap-2 ">
            <button class="btn-back" onclick="window.location.href='home.html'">
              <img src="back.png" alt="Back" />
            </button>
            <div class="title">Check Your Cholesterol Level</div>
          </div>
          

      <div class="subtitle">Controlled Cholesterol, Work Without Obstacles.</div>
      <div class="d-flex align-items-baseline mb-1">
        <div class="value">20</div>
        <div class="unit">mg/dL</div>
      </div>
      <div class="date">Friday, 17 June 2025</div>
      <img src="ticulatem 1.png" alt="Blood Sugar Graph" class="graph-image" />
    </div>
  </body>
</html>
